header-footer:
  enabled: true
  header:
  - ''
  - <color:#639bff>кңұбҙҮКҖбҙ бҙҮКҖ ЙҙбҙҖбҙҚбҙҮ
  - ''
  footer:
  - ''
  - <color:#d9a066>бҙҳКҹбҙҖКҸ.кңұбҙҮКҖбҙ бҙҮКҖ.ЙҙбҙҮбҙӣ
  - <gray>гҖҖгҖҖ%server_online% бҙҳКҹбҙҖКҸбҙҮКҖкңұ бҙҸЙҙКҹЙӘЙҙбҙҮгҖҖгҖҖ
  - ''
  disable-condition: '%world%=disabledworld'
tablist-name-formatting:
  enabled: true
  disable-condition: '%world%=disabledworld'
scoreboard-teams:
  enabled: true
  enable-collision: true
  invisible-nametags: false
  sorting-types:
  - PLACEHOLDER_HIGH_TO_LOW:%luckperms_highest_group_weight%
  - PLACEHOLDER_A_TO_Z:%player%
  case-sensitive-sorting: true
  can-see-friendly-invisibles: false
  disable-condition: '%world%=disabledworld'
playerlist-objective:
  enabled: false
  value: '%ping%'
  fancy-value: '&7бҙҳЙӘЙҙЙў: %ping%'
  title: TAB
  render-type: INTEGER
  disable-condition: '%world%=disabledworld'
belowname-objective:
  enabled: false
  value: '%vault_eco_balance_formatted%'
  title: balance
  fancy-value: '&#50ff69$%vault_eco_balance_formatted% &#ff5050вқӨ%player_health_rounded%'
  fancy-value-default: NPC
  disable-condition: '%world%=disabledworld'
prevent-spectator-effect:
  enabled: true
bossbar:
  enabled: false
  toggle-command: /bossbar
  remember-toggle-choice: false
  hidden-by-default: false
  bars:
    ServerInfo:
      style: PROGRESS
      color: YELLOW
      progress: '100'
      text: '&7бҙҳКҹбҙҖКҸ.кңұбҙҮКҖбҙ бҙҮКҖ.ЙҙбҙҮбҙӣ'
scoreboard:
  enabled: false
  toggle-command: /sb
  remember-toggle-choice: false
  hidden-by-default: false
  use-numbers: true
  static-number: 0
  delay-on-join-milliseconds: 0
  scoreboards:
    scoreboard:
      title: <color:#639bff>кңұбҙҮКҖбҙ бҙҮКҖ ЙҙбҙҖбҙҚбҙҮ
      lines:
      - '&7гҖҖгҖҖбҙҸЙҙКҹЙӘЙҙбҙҮ %online%'
      - 'kills: 0'
      - 'money: 90'
      - 'Team: tet'
      - ''
      - '&8бҙҳКҹбҙҖКҸ.кңұбҙҮКҖбҙ бҙҮКҖ.ЙҙбҙҮбҙӣ'
layout:
  enabled: false
  direction: COLUMNS
  default-skin: mineskin:383747683
  enable-remaining-players-text: true
  remaining-players-text: '... and %s more'
  empty-slot-ping-value: 1000
  layouts:
    default:
      fixed-slots:
      - '1|&3Website&f:'
      - 2|&bmyserver.net
      - '3|&8&m                       '
      - '4|&3Name&f:'
      - 5|&b%player%
      - '7|&3Rank&f:'
      - '8|Rank: %group%'
      - '10|&3World&f:'
      - 11|&b%world%
      - '13|&3Time&f:'
      - 14|&b%time%
      - '21|&3Teamspeak&f:'
      - 22|&bts.myserver.net
      - '23|&8&m                       '
      - '41|&3Store&f:'
      - 42|&bshop.myserver.net
      - '43|&8&m                       '
      groups:
        staff:
          condition: permission:tab.staff
          slots:
          - 24-40
        players:
          slots:
          - 44-80
ping-spoof:
  enabled: false
  value: -1
placeholders:
  date-format: dd.MM.yyyy
  time-format: '[HH:mm:ss / h:mm a]'
  time-offset: 0
  register-tab-expansion: false
placeholder-output-replacements:
  '%essentials_vanished%':
    'yes': '&7| Vanished'
    'no': ''
conditions:
  nick:
    conditions:
    - '%player%=%essentials_nickname%'
    true: '%player%'
    false: '%essentials_nickname%'
placeholder-refresh-intervals:
  default-refresh-interval: 500
  '%server_uptime%': 1000
  '%server_tps_1_colored%': 1000
  '%server_unique_joins%': 5000
  '%player_health%': 200
  '%player_ping%': 1000
  '%vault_prefix%': 1000
  '%rel_factionsuuid_relation_color%': 1000
  '%player_health_rounded%': 200
assign-groups-by-permissions: false
primary-group-finding-list:
- Heroi
- Mestre
- Capitao
- Oficial
- Cadete
- Recruta
- default
permission-refresh-interval: 1000
debug: false
mysql:
  enabled: false
  host: 127.0.0.1
  port: 3306
  database: tab
  username: user
  password: password
  useSSL: true
proxy-support:
  enabled: true
  type: PLUGIN
  plugin:
    name: RedisBungee
  redis:
    url: redis://:password@localhost:6379/0
  rabbitmq:
    exchange: plugin
    url: amqp://guest:guest@localhost:5672/%2F
per-world-playerlist:
  enabled: false
  allow-bypass-permission: false
  ignore-effect-in-worlds:
  - ignoredworld
  - build
  shared-playerlist-world-groups:
    lobby:
    - lobby1
    - lobby2
    minigames:
    - paintball
    - bedwars
compensate-for-packetevents-bug: false
global-playerlist:
  enabled: false
  display-others-as-spectators: false
  display-vanished-players-as-spectators: true
  isolate-unlisted-servers: false
  update-latency: false
  spy-servers:
  - spyserver1
  - spyserver2
  server-groups:
    lobbies:
    - lobby1
    - lobby2
    group2:
    - server1
    - server2
use-bukkit-permissions-manager: false
use-online-uuid-in-tablist: true
