<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Minecraft Console</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .box {
            background: #161b22; padding: 2rem; border-radius: 12px; width: 100%; max-width: 360px;
            box-shadow: 0 8px 24px rgba(0,0,0,.3); border: 1px solid #30363d;
        }
        h1 { margin: 0 0 1rem; font-size: 1.25rem; text-align: center; }
        input {
            width: 100%; padding: .75rem; margin: .5rem 0; border: 1px solid #30363d; border-radius: 8px;
            background: #0d1117; color: #c9d1d9; font-size: 1rem;
        }
        input:focus { outline: none; border-color: #58a6ff; }
        button {
            width: 100%; padding: .75rem; margin-top: 1rem; background: #238636; color: white; border: none;
            border-radius: 8px; font-size: 1rem; cursor: pointer;
        }
        button:hover { background: #2ea043; }
        .error { color: #f85149; margin-top: .5rem; font-size: .875rem; text-align: center; }
    </style>
</head>
<body>
    <form class="box" method="post" action="/login">
        <h1>Console do Servidor</h1>
        <input type="password" name="password" placeholder="Senha" required autofocus>
        <button type="submit">Entrar</button>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </form>
</body>
</html>
