name: Coins
version: ${project.version}
main: com.otalentz.coins.CoinsPlugin
api-version: '1.21'
description: Sistema de economia com moeda Coins para Paper 1.21.8+
author: oTalentz
website: https://github.com/oTalentz/plugin-minecraft-2026
softdepend:
  - Vault
commands:
  coins:
    description: Ver ou gerenciar Coins
    usage: /coins [jogador] | /coins <set/add/remove> <jogador> <quantia>
    aliases:
      - money
      - bal
  pay:
    description: Pagar outro jogador
    usage: /pay <jogador> <quantia>
permissions:
  coins.use:
    default: true
  coins.pay:
    default: true
  coins.admin:
    default: op
