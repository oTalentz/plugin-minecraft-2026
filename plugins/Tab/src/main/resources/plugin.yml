name: oTalentzTab
version: ${project.version}
main: com.otalentz.tab.TabPlugin
api-version: '1.21'
softdepend:
  - Tags
description: Gerencia tab e resource pack de ranks
commands:
  otab:
    description: Recarrega tab e resource pack
    usage: /otab [reload|pack|update|test]
    permission: otalentztab.admin
permissions:
  otalentztab.admin:
    default: op
